spring:
  application:
    name: traxo-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:traxo}
    username: ${DB_USER:traxo}
    password: ${DB_PASSWORD:traxo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2

server:
  port: 8080
  servlet:
    context-path: /api

traxo:
  jwt:
    secreto: ${JWT_SECRETO}
    expiracion-ms: ${JWT_EXPIRACION_MS:86400000}  # 24 horas
  micros:
    url: ${MICROS_URL:http://localhost:3000}
    api-key: ${MICROS_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

