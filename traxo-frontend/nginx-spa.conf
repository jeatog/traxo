server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Todas las rutas van al index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets con hash
    location ~* \.(js|css|png|svg|ico|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
