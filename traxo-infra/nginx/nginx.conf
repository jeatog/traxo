events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting — ventanas por IP
    # login:    5 intentos/min,  burst 3
    # registro: 3 intentos/min,  burst 1
    limit_req_zone $binary_remote_addr zone=auth_login:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=auth_registro:10m rate=3r/m;

    # Redireccion HTTP -> HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS principal
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Cabeceras de seguridad
        add_header X-Frame-Options        "DENY"                always;
        add_header X-Content-Type-Options "nosniff"             always;
        add_header Referrer-Policy        "no-referrer"         always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
            always;

        # Login — con rate limiting
        location = /api/auth/login {
            limit_req        zone=auth_login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend:8080/api/auth/login;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Registro — con rate limiting
        location = /api/auth/registro {
            limit_req        zone=auth_registro burst=1 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend:8080/api/auth/registro;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API -> backend
        location /api/ {
            proxy_pass         http://backend:8080/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Actuator (solo health, interno)
        location /actuator/health {
            proxy_pass http://backend:8080/api/actuator/health;
            allow 127.0.0.1;
            deny all;
        }

        # Frontend Angular SPA
        location / {
            proxy_pass         http://frontend:80/;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
