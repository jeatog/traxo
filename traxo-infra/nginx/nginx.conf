events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Restaurar IP real cuando el tráfico pasa por Cloudflare
    # IPv4
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Rate limiting — ventanas por IP
    # login:    5 intentos/min,  burst 3
    # registro: 3 intentos/min,  burst 1
    limit_req_zone $binary_remote_addr zone=auth_login:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=auth_registro:10m rate=3r/m;

    # Redireccion HTTP -> HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS principal
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Cabeceras de seguridad
        add_header X-Frame-Options        "DENY"                always;
        add_header X-Content-Type-Options "nosniff"             always;
        add_header Referrer-Policy        "no-referrer"         always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
            always;

        # Login — con rate limiting
        location = /api/auth/login {
            limit_req        zone=auth_login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend:8080/api/auth/login;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Registro — con rate limiting
        location = /api/auth/registro {
            limit_req        zone=auth_registro burst=1 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend:8080/api/auth/registro;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API -> backend
        location /api/ {
            proxy_pass         http://backend:8080/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Actuator (solo health, interno)
        location /actuator/health {
            proxy_pass http://backend:8080/api/actuator/health;
            allow 127.0.0.1;
            deny all;
        }

        # Frontend Angular SPA
        location / {
            proxy_pass         http://frontend:80/;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
